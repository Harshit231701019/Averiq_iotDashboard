<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IoT Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-slate-300 font-sans min-h-screen flex items-center justify-center relative overflow-hidden antialiased animate-push-in">
    
    <!-- Background Accents -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="z-10 w-full max-w-md px-6 animate-fade-in-up">
        
        <!-- Login Card -->
        <div class="bg-card/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.5)] relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent"></div>

            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-slate-800 rounded-2xl flex items-center justify-center mb-6 border border-slate-700 shadow-[0_0_30px_rgba(59,130,246,0.3)] group hover:scale-110 transition-transform duration-500">
                    <i class="fa-solid fa-satellite-dish text-primary text-3xl group-hover:animate-pulse"></i>
                </div>
                <h1 class="text-4xl font-black text-white tracking-widest uppercase mb-2 neon-text">AVERIQ</h1>
                <p class="text-sm text-slate-400 font-medium tracking-wide uppercase opacity-70" data-i18n="desc.welcome">Secure Enterprise Access</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1 pl-1" data-i18n="lbl.email">Email Address</label>
                        <div class="relative">
                            <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-slate-500"></i>
                            <input type="email" required value="admin@enterprise.iot" class="w-full bg-dark/50 border border-slate-700 text-white rounded-lg pl-11 pr-4 py-3 focus:ring-1 focus:ring-primary focus:border-primary transition-colors outline-none placeholder-slate-500" placeholder="name@company.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1 pl-1" data-i18n="lbl.pass">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-500"></i>
                            <input type="password" required value="password123" class="w-full bg-dark/50 border border-slate-700 text-white rounded-lg pl-11 pr-4 py-3 focus:ring-1 focus:ring-primary focus:border-primary transition-colors outline-none placeholder-slate-500" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-center justify-between mt-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded border-slate-700 text-primary focus:ring-primary bg-dark/50">
                            <span class="text-sm text-slate-400" data-i18n="lbl.remember">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-primary hover:text-blue-400 transition-colors" data-i18n="link.forgot">Forgot Password?</a>
                    </div>

                    <button type="submit" id="login-btn" class="w-full bg-primary hover:bg-blue-400 text-white font-black tracking-widest uppercase py-4 px-4 rounded-xl transition-all duration-500 relative overflow-hidden group mt-8 hover:shadow-[0_0_50px_rgba(59,130,246,0.5)] border border-blue-400/30">
                        <span id="btn-text" data-i18n="btn.login">Secure Login</span>
                        <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center text-sm text-slate-400">
                <span data-i18n="text.noacc">Don't have an account?</span> <a href="#" class="text-primary hover:text-blue-400 transition-colors font-medium" data-i18n="link.signup">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="flow.js"></script>
</body>
</html>
