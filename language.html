<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language - IoT Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-slate-300 font-sans min-h-screen flex items-center justify-center relative overflow-hidden antialiased animate-push-in">
    
    <!-- Ambient Glow Backgrounds -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="z-10 w-full max-w-2xl px-6 animate-fade-in-up">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-800 border border-slate-700 shadow-xl mb-6">
                <i class="fa-solid fa-language text-primary text-3xl"></i>
            </div>
            <h2 class="text-4xl font-black text-white tracking-tight mb-3">Select Language</h2>
            <p class="text-slate-400 text-lg">Choose your preferred interface language</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-12" id="language-grid">
            <!-- Language Options -->
            <button class="industry-card reveal-card stagger-1 bg-card/50 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-6 text-left group relative overflow-hidden" onclick="selectOption(this, 'language', 'English')">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">English</h3>
                        <p class="text-sm text-slate-500 mt-1">United States</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                        <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                    </div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>

            <button class="industry-card reveal-card stagger-2 bg-card/50 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-6 text-left group relative overflow-hidden" onclick="selectOption(this, 'language', 'Tamil')">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">தமிழ்</h3>
                        <p class="text-sm text-slate-500 mt-1">Tamil</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                        <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                    </div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>

            <button class="industry-card reveal-card stagger-3 bg-card/50 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-6 text-left group relative overflow-hidden" onclick="selectOption(this, 'language', 'Telugu')">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">తెలుగు</h3>
                        <p class="text-sm text-slate-500 mt-1">Telugu</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                        <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                    </div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>

            <button class="industry-card reveal-card stagger-4 bg-card/50 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-6 text-left group relative overflow-hidden" onclick="selectOption(this, 'language', 'Hindi')">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">हिन्दी</h3>
                        <p class="text-sm text-slate-500 mt-1">Hindi</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                        <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                    </div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>

            <button class="industry-card reveal-card stagger-5 bg-card/50 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-6 text-left group relative overflow-hidden sm:col-span-2 md:col-span-1" onclick="selectOption(this, 'language', 'Malayalam')">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">മലയാളം</h3>
                        <p class="text-sm text-slate-500 mt-1">Malayalam</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                        <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                    </div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
        </div>

        <div class="text-center">
            <button id="continue-btn" onclick="goToNext('industry.html')" class="px-12 py-4 bg-slate-800 text-slate-500 font-bold rounded-xl transition-all duration-300 cursor-not-allowed border border-slate-700" disabled>
                CONTINUE <i class="fa-solid fa-chevron-right ml-2 text-sm"></i>
            </button>
        </div>
    </div>

    <script src="flow.js"></script>
</body>
</html>
