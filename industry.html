<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Industry - IoT Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-slate-300 font-sans min-h-screen flex flex-col relative antialiased animate-push-in">
    
    <!-- Minimal Navbar -->
    <header class="bg-card/50 backdrop-blur-sm border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-satellite-dish text-primary text-xl"></i>
                <span class="font-bold text-white tracking-wide" data-i18n="title.enterprise">Enterprise Setup</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <button class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-regular fa-circle-user text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-grow flex items-center justify-center relative py-12">
        <!-- Ambient Glow Backgrounds -->
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="z-10 w-full max-w-5xl px-6 animate-fade-in-up">
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-800 border border-slate-700 shadow-xl mb-6">
                    <i class="fa-solid fa-industry text-primary text-3xl"></i>
                </div>
                <h2 class="text-4xl font-black text-white tracking-tight mb-3" data-i18n="title.industry">Select Your Industry</h2>
                <p class="text-slate-400 text-lg max-w-2xl mx-auto" data-i18n="desc.industry">We'll tailor the dashboard widgets and risk monitors to your specific environment.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12" id="industry-grid">
                
                <button class="industry-card reveal-card stagger-1 bg-card/40 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-8 text-left group relative overflow-hidden" onclick="selectOption(this, 'industry', 'Food Industry')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center text-primary group-hover:scale-110 group-hover:border-primary/30 transition-all duration-300">
                            <i class="fa-solid fa-utensils text-2xl"></i>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                            <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors" data-i18n="ind.food">Food Industry</h3>
                    <p class="text-slate-500 text-sm leading-relaxed" data-i18n="ind.food.desc">Cold storage, contamination, packaging</p>
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

                <button class="industry-card reveal-card stagger-2 bg-card/40 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-8 text-left group relative overflow-hidden" onclick="selectOption(this, 'industry', 'Manufacturing')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center text-primary group-hover:scale-110 group-hover:border-primary/30 transition-all duration-300">
                            <i class="fa-solid fa-gears text-2xl"></i>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                            <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors" data-i18n="ind.mfg">Manufacturing</h3>
                    <p class="text-slate-500 text-sm leading-relaxed" data-i18n="ind.mfg.desc">Machinery, warehouse, assembly lines</p>
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

                <button class="industry-card reveal-card stagger-3 bg-card/40 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-8 text-left group relative overflow-hidden" onclick="selectOption(this, 'industry', 'Smart Home')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center text-primary group-hover:scale-110 group-hover:border-primary/30 transition-all duration-300">
                            <i class="fa-solid fa-house-chimney-window text-2xl"></i>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                            <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors" data-i18n="ind.home">Smart Home</h3>
                    <p class="text-slate-500 text-sm leading-relaxed" data-i18n="ind.home.desc">Residential metrics, security, energy</p>
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

                <button class="industry-card reveal-card stagger-4 bg-card/40 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-8 text-left group relative overflow-hidden" onclick="selectOption(this, 'industry', 'Agriculture')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center text-primary group-hover:scale-110 group-hover:border-primary/30 transition-all duration-300">
                            <i class="fa-solid fa-seedling text-2xl"></i>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                            <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors" data-i18n="ind.agri">Agriculture</h3>
                    <p class="text-slate-500 text-sm leading-relaxed" data-i18n="ind.agri.desc">Greenhouses, soil moisture, climate</p>
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

                <button class="industry-card reveal-card stagger-5 bg-card/40 backdrop-blur-md border border-slate-700/50 hover:border-primary/50 hover:bg-slate-800/80 rounded-2xl p-8 text-left group relative overflow-hidden md:col-span-2 lg:col-span-1" onclick="selectOption(this, 'industry', 'Construction')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center text-primary group-hover:scale-110 group-hover:border-primary/30 transition-all duration-300">
                            <i class="fa-solid fa-helmet-safety text-2xl"></i>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center transition-all group-hover:border-primary/30">
                            <i class="fa-solid fa-check text-primary opacity-0 transition-opacity check-icon"></i>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors" data-i18n="ind.const">Construction</h3>
                    <p class="text-slate-500 text-sm leading-relaxed" data-i18n="ind.const.desc">Site safety, heavy equipment analytics</p>
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

            </div>

            <div class="text-center">
                <button id="continue-btn" onclick="goToNext('login.html')" class="px-12 py-4 bg-slate-800 text-slate-500 font-bold rounded-xl transition-all duration-300 cursor-not-allowed border border-slate-700" disabled>
                    <span data-i18n="btn.continue">CONTINUE</span> <i class="fa-solid fa-chevron-right ml-2 text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="flow.js"></script>
</body>
</html>
