<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Industrial IoT Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a', /* slate-900 */
                        card: '#1e293b', /* slate-800 */
                        primary: '#3b82f6', /* blue-500 */
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark font-sans min-h-screen flex items-center justify-center relative overflow-hidden antialiased">

    <!-- Ambient Glow Background -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="z-10 text-center flex flex-col items-center animate-fade-in-up">
        <!-- Industrial Logo -->
        <div class="w-24 h-24 rounded-full bg-slate-800 border border-slate-700 shadow-[0_0_30px_rgba(59,130,246,0.2)] flex items-center justify-center mb-8">
            <i class="fa-solid fa-satellite-dish text-primary text-4xl"></i>
        </div>

        <!-- Glowing Neon Title -->
        <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-cyan-400 to-indigo-500 drop-shadow-[0_0_20px_rgba(59,130,246,0.6)] tracking-[0.2em] uppercase mb-12 neon-text">
            AVERIQ
        </h1>

        <!-- Start Button -->
        <a href="language.html" class="group relative px-10 py-5 bg-primary text-white font-black tracking-[0.2em] rounded-xl overflow-hidden transition-all duration-500 hover:scale-110 hover:shadow-[0_0_50px_rgba(59,130,246,0.5)] border border-blue-400/30">
            <span class="relative z-10 flex items-center gap-4">
                <span data-i18n="btn.start">START MONITORING</span> 
                <i class="fa-solid fa-chevron-right group-hover:translate-x-2 transition-transform duration-300"></i>
            </span>
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
        </a>
    </div>

    <script src="translations.js"></script>
</body>
</html>
